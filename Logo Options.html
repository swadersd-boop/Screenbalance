// ─── CURRENT BRAND: Screen Balance ──────────────────────────────────────────

    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 22 * size }}>
      {/* Checkbox tablet icon */}

        <path d="M22 33 L30 42 L46 24" stroke={iconFg} strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" fill="none"/>

        <rect x="20" y="20" width="16" height="3" rx="1.5" fill={iconFg} opacity="0.2"/>
      </svg>
      {/* Wordmark */}
      <div style={{ textAlign: 'center' }}>
        <div style={{
          fontFamily: "'DM Sans', sans-serif",
          fontWeight: 900,
          fontSize: 32 * size,
          letterSpacing: '0.06em',
          textTransform: 'uppercase',
          color: fg,
          lineHeight: 1,

          SCREEN BALANCE

          fontFamily: "'DM Sans', sans-serif",
          fontWeight: 600,
          fontSize: 13 * size,

// ─── OPTION 3: Freeplay ──────────────────────────────────────────────────────
function FreeplayLogo({ size = 1, variant = 'default' }) {
  const isDark = variant === 'dark';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 22 * size }}>
      {/* Mark: unlocked padlock with play button */}
      <svg width={80 * size} height={80 * size} viewBox="0 0 80 80" fill="none">
        {/* Shackle (open) */}
        <path d="M26 38 L26 28 Q26 14 40 14 Q54 14 54 28 L54 32" stroke={primary} strokeWidth="5.5" strokeLinecap="round" fill="none"/>

        <rect x="14" y="37" width="52" height="36" rx="9" fill={primary}/>

        <path d="M34 49 L34 63 L52 56 Z" fill={isDark ? '#1b1040' : isColor ? '#5c3bcc' : '#fff'}/>
        {/* Sparkle */}

        <line x1="59" y1="15" x2="59" y2="19" stroke={secondary} strokeWidth="2.5" strokeLinecap="round"/>
        <line x1="59" y1="25" x2="59" y2="29" stroke={secondary} strokeWidth="2.5" strokeLinecap="round"/>
        <line x1="52" y1="22" x2="56" y2="22" stroke={secondary} strokeWidth="2.5" strokeLinecap="round"/>
        <line x1="62" y1="22" x2="66" y2="22" stroke={secondary} strokeWidth="2.5" strokeLinecap="round"/>
      </svg>
      {/* Wordmark */}
      <div style={{ textAlign: 'center' }}>
        <div style={{
          fontFamily: "'DM Sans', sans-serif",
          fontWeight: 900,
          fontSize: 40 * size,
          letterSpacing: '-0.03em',
          lineHeight: 1,
          color: isDark ? '#fff' : isColor ? '#fff' : '#1b1040',
        }}>
          free<span style={{ color: secondary }}>play</span>

        <div style={{

          marginTop: 7 * size,

      </div>
    </div>
  );
}

        <div style={{ fontSize: 11, color: '#5c3bcc', fontWeight: 600, marginBottom: 4 }}>CONCEPT NOTE</div>
        <div style={{ fontSize: 12, color: '#2d1a6e', lineHeight: 1.5 }}>
          An unlocked padlock with a play button inside — freedom <em>earned</em>. 
          Kid-forward energy with a playful purple/pink palette. The slogan is punchy and child-readable.
        </div>
      </div>
    </div>
  );
}
